apiVersion: v1
kind: ConfigMap
metadata:
  name: ticket-config
  namespace: ticket-app
data:
  SPRING_DATASOURCE_URL: "jdbc:postgresql://postgres-service:5432/ticketing_db"
  SPRING_JPA_HIBERNATE_DDL_AUTO: "update"
  SPRING_JPA_SHOW_SQL: "false"
  SERVER_PORT: "8080"
  APP_CORS_ALLOWED_ORIGINS: "http://localhost"
  APP_JWT_EXPIRATION: "86400000"
  APP_JWT_REFRESH_EXPIRATION: "604800000"
  SPRING_MAIL_HOST: "smtp.gmail.com"
  SPRING_MAIL_PORT: "587"
